#####################################
about-title: Who We Are
about-description: SummitGrid Energy Investments Canada Corp. is a Canada-based global new energy investment and operation group. We focus on new energy investment, engineering construction, global supply chain, intelligent energy-saving products, renewable O&M, technical training, and carbon asset services.
about-description2: With a strong international presence, we support projects across North America, South America, the Middle East, Southeast Asia, and West Africa. Combining global expertise with localized execution, we deliver reliable and sustainable energy solutions tailored to diverse market needs.
