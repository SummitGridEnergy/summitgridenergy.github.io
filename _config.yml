core-title: Solar Panel Solutions
core-description: Built on advanced TOPCon cell technology, our solar modules deliver high power output, low degradation, and optimized performance across a wide range of operating conditions.
#
# Core Features Left
#
core-features-left:
  # Feature
  - name: High Power Output
    description: Modules deliver up to ~715W output with optimized cell architecture, increasing energy density and reducing system BOS costs.
    icon:

  # Feature
  - name: Low Degradation Rate
    description: ≤1% first-year degradation and ≤0.4–0.45% annual degradation ensure stable long-term energy yield.
    icon: 

  # Feature
  - name: Advanced TOPCon Technology
    description: N-type TOPCon cell technology improves conversion efficiency and delivers ~6% higher energy generation compared to PERC modules.
    icon: 

#
# Core Features Right
#
core-features-right:
  # Feature
  - name: Excellent Low-Light Performance
    description: Enhanced cell sensitivity enables consistent power generation under low irradiance and diffuse light conditions.
    icon: 

  # Feature
  - name: High Bifacial Efficiency
    description: High bifaciality design captures additional rear-side irradiance, increasing total system output in suitable installations.
    icon: 

  # Feature
  - name: Low Levelized Cost of Energy (LCOE)
    description: Higher efficiency, lower degradation, and optimized system compatibility reduce overall lifetime energy cost.
    icon: 


